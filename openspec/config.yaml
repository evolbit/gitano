schema: spec-driven

context: |
  Product: Gitano is a newer version of GitKraken focused on simplifying the Git experience, making the tool easier to use, and improving developer experience.
  Goal: Provide the full power of Git functionality in a way that feels approachable and easy to understand.
  Product direction: The project prioritizes innovative ideas and should aim beyond what is already implemented. New features should be evaluated carefully to arrive at the best version before implementation.
  Engineering principles: Code should follow best practices and stay as simple as possible so it is easy for everybody to understand and maintain.
  Performance expectations: The tool should feel fast, responsive, and efficient in everyday use.
  UI: The user interface should be intuitive and easy to use, with clear and consistent design. As dummy as possible and delegate logic to the backend.

